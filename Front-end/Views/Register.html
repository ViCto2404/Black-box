<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - UNPHU</title>
    <link rel="stylesheet" href="../CSS/Styles.css">
    <link rel="stylesheet" href="../CSS/navbar.css">
</head>
<body>

<div class="navbar">
    <div class="left">
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <a href="Home.html" class="logo">BLACKBOX</a>
    </div>
    <div class="right" id="nav-auth-section">
        <a href="login.html">Login</a>
        <a href="Register.html" class="btn-register">Register</a>
    </div>
</div>

<div id="sidebar" class="sidebar">
    <p class="logo">UNPHU</p>
    <div class="sidebar-menu">
        <button class="dropdown-btn">🎓 Gestión Académica ▼</button>
        <div class="dropdown-container">
            <a href="Escuela.html">Escuelas</a>
            <a href="Carrera.html">Carreras</a>
            <a href="Materias.html">Materias</a>
            <a href="Seccion.html">Secciones</a>
            <a href="Profesor.html">Profesores</a>
            <a href="Director.html">Directores</a>
        </div>
        <button class="dropdown-btn">👨‍🎓 Estudiantes ▼</button>
        <div class="dropdown-container">
            <a href="Formularios.html">Formularios</a>
        </div>
        <button class="dropdown-btn">📊 Administracion ▼</button>
        <div class="dropdown-container">
            <a href="directores.html">Directores</a>
            <a href="importacion.html">Importación</a>
        </div>
    </div>
</div>

<div class="container">
    <div class="form-container auth">
        <div class="form-header">
            <h2>UNPHU Academic Insights</h2>
            <p>Registro de Usuario</p>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" placeholder="Ingrese su nombre completo" required>
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="ejemplo@unphu.edu.do" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required>
            </div>

            <div class="form-group">
                <label for="rol">Tipo de Usuario</label>
                <select id="rol" required>
                    <option value="">Seleccione una opción</option>
                    <option value="estudiante">Estudiante</option>
                    <option value="admin">Director / Administrador</option>
                </select>
            </div>

            <button type="submit" class="btn-unphu">Registrarse</button>

            <div class="form-footer">
                <p>¿Ya tienes cuenta? <a href="login.html">Iniciar Sesión</a></p>
            </div>
        </form>
    </div>
</div>

<script src="../JS/auth.js"></script>
<script src="../JS/navbar.js"></script>
</body>
</html>
