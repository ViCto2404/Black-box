<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Importación</title>
    <link rel="stylesheet" href="../CSS/Styles.css">
</head>
<body>
<div class="navbar">
    <div class="left">
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <a href="Home.html" class="logo">BLACKBOX</a>
    </div>
    <div class="right" id="nav-auth-section">
        <a href="login.html">Login</a>
        <a href="Register.html" class="btn-register">Register</a>
    </div>
</div>

    <div class="form-container admin">
    <div class="form-header">
        <h2>Gestión de Datos Académicos</h2>
        <p>Carga Masiva de Calificaciones (RF2)</p>
    </div>
    <div class="import-box">
        <label for="fileUpload" class="drop-zone">
            <span>Arrastre aquí su archivo CSV o haga clic</span>
            <input type="file" id="fileUpload" accept=".csv, .xlsx" hidden>
        </label>
        <p class="file-format">Formato requerido: ACAD---15---XLSX</p>
    </div>
    <div class="form-actions">
        <button class="btn-unphu">Procesar Calificaciones</button>
        <button class="btn-secondary">Descargar Plantilla (999999)</button>
    </div>
    
    <div class="preview-section" id="previewSection" style="display: none;">
        <h3>Vista previa del archivo cargado</h3>
        <div class="preview-table-container">
            <table class="preview-table">
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Materia</th>
                        <th>Estudiantes Activos</th>
                        <th>Promedio General</th>
                        <th>% Aprobación</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="previewBody">
                    <!-- Aquí se llenará dinámicamente -->
                </tbody>
            </table>
        </div>
    </div>

</div>
<script>
document.getElementById("fileUpload").addEventListener("change", function(event) {
    const file = event.target.files[0];
    const reader = new FileReader();

    reader.onload = function(e) {
        const text = e.target.result;
        const rows = text.split("\n");
        const tbody = document.getElementById("previewBody");
        tbody.innerHTML = "";

        rows.slice(1).forEach(row => {
            const cols = row.split(",");
            if(cols.length > 1){
                const tr = document.createElement("tr");
                cols.forEach(col => {
                    const td = document.createElement("td");
                    td.textContent = col.trim();
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            }
        });

        document.getElementById("previewSection").style.display = "block";
    };

    reader.readAsText(file);
});
</script>

</body>
</html>
