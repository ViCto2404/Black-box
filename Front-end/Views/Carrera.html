<div class="container">
    <div class="header-tabla">
        <div class="titulo-seccion">
            <h2>Gestión de</h2>
            <h1>Carreras</h1>
        </div>
        <button class="btn-unphu-largo" onclick="abrirModal()">+ NUEVA CARRERA</button>
    </div>

    <div class="card-tabla">
        <div class="card-header">
            <h3>Lista de Carreras</h3>
        </div>
        <table id="tablaCarreras">
            <thead>
                <tr>
                    <th>Código</th>
                    <th>Nombre</th>
                    <th>Escuela</th>
                    <th>Duración</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>


<div id="modalCarrera" class="modal">
    <div class="modal-content">
        <div class="form-container admin"> <span class="cerrar" onclick="cerrarModal()">&times;</span>

            <div class="form-header">
                <h2 id="modalTitle">Nueva Carrera</h2>
            </div>

            <form id="crearCarreraForm">
                <div class="form-group">
                    <label>Código</label>
                    <input type="text" id="codigoCarrera" maxlength="10" required placeholder="Ej: ISC">
                </div>

                <div class="form-group">
                    <label>Nombre de la Carrera</label>
                    <input type="text" id="nombreCarrera" maxlength="100" required>
                </div>

                <div class="form-group">
                    <label>Escuela</label>
                    <select id="escuelaCarrera" required>
                        <option value="">Seleccione Escuela</option>
                        <option value="ESC-INF">Escuela de Informática</option>
                        <option value="ESC-IND">Escuela de Ingeniería Industrial</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Duración (años)</label>
                    <input type="number" id="duracion" min="1" max="7" required>
                </div>

                <div class="form-group">
                    <label>Estado</label>
                    <select id="estadoCarrera">
                        <option value="Activa">Activa</option>
                        <option value="Inactiva">Inactiva</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-unphu">Guardar</button>
                    <button type="button" class="btn-secondary" onclick="cerrarModal()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="../JS/carreras.js"></script>
<script src="../JS/navbar.js"></script>
</body>
</html>
