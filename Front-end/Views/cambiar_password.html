<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar Contraseña - UNPHU</title>
    <link rel="stylesheet" href="../CSS/global.css">
    <link rel="stylesheet" href="../CSS/Styles.css">
    <link rel="stylesheet" href="../CSS/navbar.css">
</head>
<body>

<div class="navbar">
    <div class="left">
        <a href="login.html" class="logo">BLACKBOX</a>
    </div>
</div>

<div class="container">
    <div class="form-container auth">
        <div class="form-header">
            <h2>UNPHU Academic Insights</h2>
            <p>Actualizar Contraseña</p>
        </div>

        <form id="changePasswordForm">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="ejemplo@unphu.edu.do" required>
            </div>

            <div class="form-group">
                <label for="password_actual">Contraseña Actual</label>
                <input type="password" id="password_actual" required>
            </div>

            <div class="form-group">
                <label for="password_nuevo">Nueva Contraseña</label>
                <input type="password" id="password_nuevo" minlength="6" required>
            </div>

            <div class="form-group">
                <label for="password_confirmacion">Confirmar Nueva Contraseña</label>
                <input type="password" id="password_confirmacion" minlength="6" required>
            </div>

            <button type="submit" class="btn-unphu">Actualizar Contraseña</button>

            <div class="form-footer">
                <p><a href="login.html">Volver al Inicio de Sesión</a></p>
            </div>
        </form>
    </div>
</div>

<footer class="main-footer">
    <div class="footer-content">
        <div class="footer-left">
            <p><strong>UNPHU</strong> - Universidad Nacional Pedro Henríquez Ureña</p>
        </div>
        <div class="footer-right">
            <p>&copy; 2026 BlackBox Project.</p>
        </div>
    </div>
</footer>

<script src="../JS/config.js"></script>
<script src="../JS/auth.js"></script>
</body>
</html>
